openapi: 3.0.3
info:
  version: 1.0.0
  title: Fabric API
servers:
  - url: https://api.fabric.so
    description: Fabric API
security:
  - OAuth2: []
  - ApiKey: []
paths:
  /v2/bookmarks:
    post:
      tags:
        - Bookmarks
      operationId: createBookmark
      x-method-name: create
      summary: Create bookmark
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                tags:
                  type: array
                  items:
                    anyOf:
                      - type: object
                        properties:
                          id:
                            $ref: '#/components/schemas/UUID'
                        required:
                          - id
                      - type: object
                        properties:
                          name:
                            type: string
                            maxLength: 255
                        required:
                          - name
                parentId:
                  anyOf:
                    - $ref: '#/components/schemas/UUID'
                    - $ref: '#/components/schemas/RootAlias'
                  description: Parent resource ID or an alias (the alias is resolved to the actual ID during the request handling).
                comment:
                  allOf:
                    - $ref: '#/components/schemas/CommentCreate'
                    - nullable: true
                name:
                  type: string
                  nullable: true
                  minLength: 1
              required:
                - url
                - parentId
      responses:
        '201':
          description: Bookmark created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookmarkCreationResponse'
  /v2/resources/{resourceId}/comments:
    get:
      tags:
        - Comments
      operationId: listResourceComments
      x-method-name: list
      summary: List comments
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - schema:
            $ref: '#/components/schemas/UUID'
          required: true
          name: resourceId
          in: path
        - schema:
            type: integer
            minimum: 0
            exclusiveMinimum: true
          required: false
          name: limit
          in: query
        - schema:
            type: integer
            nullable: true
            minimum: 0
          required: false
          name: offset
          in: query
        - schema:
            type: string
          required: false
          name: accessToken
          in: query
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: number
                    minimum: 0
                  data:
                    type: object
                    properties:
                      comments:
                        type: array
                        items:
                          $ref: '#/components/schemas/CommentWithAuthor'
                    required:
                      - comments
                required:
                  - count
                  - data
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    enum:
                      - Not Found
                  detail:
                    type: string
                    enum:
                      - resource_not_found
                required:
                  - title
                  - detail
  /v2/files:
    post:
      tags:
        - Files
      operationId: createFile
      x-method-name: create
      summary: Create file
      description: To create a file item you first need to store it using the upload endpoint.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileCreation'
      responses:
        '201':
          description: File created
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ResourceDetailDocument'
                  - $ref: '#/components/schemas/ResourceDetailAudio'
                  - $ref: '#/components/schemas/ResourceDetailVideo'
                  - $ref: '#/components/schemas/ResourceDetailImage'
                  - $ref: '#/components/schemas/ResourceDetailDefault'
  /v2/folders:
    post:
      tags:
        - Folders
      operationId: createFolder
      x-method-name: create
      summary: Create folder
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  nullable: true
                  minLength: 1
                  maxLength: 255
                parentId:
                  anyOf:
                    - $ref: '#/components/schemas/UUID'
                    - $ref: '#/components/schemas/RootAlias'
                  description: Parent resource ID or an alias (the alias is resolved to the actual ID during the request handling).
                description:
                  type: string
                  nullable: true
                icon:
                  oneOf:
                    - type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - emoji
                        emoji:
                          type: string
                          minLength: 1
                      required:
                        - type
                        - emoji
                    - type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - predefined
                        predefined:
                          type: string
                          minLength: 1
                      required:
                        - type
                        - predefined
                    - type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - customImage
                        customImage:
                          type: string
                          minLength: 1
                      required:
                        - type
                        - customImage
                    - nullable: true
              required:
                - parentId
      responses:
        '201':
          description: Folder created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceDetailFolder'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    enum:
                      - Not Found
                  detail:
                    type: string
                    enum:
                      - resource_not_found
                required:
                  - title
                  - detail
  /v2/memories:
    post:
      tags:
        - Memories
      operationId: createMemory
      x-method-name: create
      summary: Create memory
      description: |-
        Create a memory by analyzing the provided input data.

        Set `infer` to `false` to skip inference and store the memory verbatim.

        Memory inference is asynchronous. The response contains a job ID which can be used to track the status of the memory creation.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryJobSource'
      responses:
        '200':
          description: Memory created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryJob'
  /v2/memories/{memoryId}:
    delete:
      tags:
        - Memories
      operationId: deleteMemory
      x-method-name: delete
      summary: Delete memory
      description: Delete an existing memory.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - schema:
            $ref: '#/components/schemas/UUID'
          required: true
          name: memoryId
          in: path
      responses:
        '204':
          description: Memory deleted
    get:
      tags:
        - Memories
      operationId: getMemory
      x-method-name: get
      summary: Get memory
      description: Retrieve the details of a specific memory.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - schema:
            $ref: '#/components/schemas/UUID'
          required: true
          name: memoryId
          in: path
      responses:
        '200':
          description: Memory details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memory'
    patch:
      tags:
        - Memories
      operationId: updateMemory
      x-method-name: update
      summary: Update memory
      description: Update the name and content of an existing memory.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - schema:
            $ref: '#/components/schemas/UUID'
          required: true
          name: memoryId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  nullable: true
                content:
                  type: string
                  minLength: 5
                  maxLength: 20000
      responses:
        '204':
          description: Memory updated
  /v2/memories/jobs/{jobId}:
    get:
      tags:
        - Memories
      operationId: getMemoryJob
      x-method-name: getJob
      summary: Get memory job
      description: Retrieve the status and details of a memory creation job.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - schema:
            $ref: '#/components/schemas/UUID'
          required: true
          name: jobId
          in: path
      responses:
        '200':
          description: Memory job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryJob'
  /v2/memories/search:
    get:
      tags:
        - Memories
      operationId: searchMemories
      x-method-name: search
      summary: Search memories
      description: |-
        Search through memories using a query string.

        Uses hybrid semantic and keyword-based search with a recency bias to find relevant memories. Results are sorted by relevance and include a relevance score (higher is better).
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - schema:
            type: string
          required: false
          name: query
          in: query
        - schema:
            type: integer
            minimum: 0
            exclusiveMinimum: true
          required: false
          name: limit
          in: query
        - schema:
            type: integer
            nullable: true
            minimum: 0
          required: false
          name: offset
          in: query
        - schema:
            type: object
            properties:
              property:
                type: string
                enum:
                  - id
                  - id
                  - createdAt
                  - modifiedAt
              direction:
                type: string
                enum:
                  - ASC
                  - DESC
                default: ASC
            required:
              - property
          required: false
          name: order
          in: query
      responses:
        '200':
          description: Memory search
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    minimum: 0
                  hasMore:
                    type: boolean
                  hits:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Memory'
                        - type: object
                          properties:
                            score:
                              type: number
                required:
                  - total
                  - hasMore
                  - hits
  /v2/notepads:
    post:
      tags:
        - Notepads
      operationId: createNotepad
      x-method-name: create
      summary: Create notepad
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  properties:
                    name:
                      type: string
                      nullable: true
                      minLength: 1
                      maxLength: 255
                    parentId:
                      anyOf:
                        - $ref: '#/components/schemas/UUID'
                        - $ref: '#/components/schemas/RootAlias'
                      description: Parent resource ID or an alias (the alias is resolved to the actual ID during the request handling).
                    tags:
                      type: array
                      items:
                        anyOf:
                          - type: object
                            properties:
                              id:
                                $ref: '#/components/schemas/UUID'
                            required:
                              - id
                          - type: object
                            properties:
                              name:
                                type: string
                                maxLength: 255
                            required:
                              - name
                    comment:
                      allOf:
                        - $ref: '#/components/schemas/CommentCreate'
                        - nullable: true
                  required:
                    - parentId
                - anyOf:
                    - type: object
                      properties:
                        text:
                          type: string
                      required:
                        - text
                    - type: object
                      required:
                        - ydoc
      responses:
        '201':
          description: Notepad created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceDetailNotepad'
  /v2/notepads/{resourceId}/content:
    get:
      tags:
        - Notepads
      operationId: getNotepadContent
      x-method-name: getContent
      summary: Get notepad content
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - schema:
            $ref: '#/components/schemas/UUID'
          required: true
          name: resourceId
          in: path
      responses:
        '200':
          description: Notepad content
          content:
            text/plain:
              schema:
                type: string
                format: text
        '404':
          description: Notepad not found
  /v2/resources/{resourceId}:
    get:
      tags:
        - Resources
      operationId: getResource
      x-method-name: get
      summary: Get resource
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - schema:
            $ref: '#/components/schemas/UUID'
          required: true
          name: resourceId
          in: path
      responses:
        '200':
          description: Resource detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceDetail'
  /v2/resources/filter:
    post:
      tags:
        - Resources
      operationId: filterResources
      x-method-name: filter
      summary: List resources
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                kind:
                  type: array
                  items:
                    $ref: '#/components/schemas/Kind'
                kindExclude:
                  type: array
                  items:
                    $ref: '#/components/schemas/Kind'
                rootId:
                  $ref: '#/components/schemas/UUID'
                taskId:
                  $ref: '#/components/schemas/UUID'
                tagIds:
                  type: array
                  items:
                    $ref: '#/components/schemas/UUID'
                name:
                  type: string
                url:
                  type: string
                  format: uri
                  description: Look up by the URL of a bookmark kind resource.
                parentId:
                  allOf:
                    - $ref: '#/components/schemas/UUID'
                    - nullable: true
                parentRoot:
                  type: object
                  properties:
                    type:
                      $ref: '#/components/schemas/RootType'
                    subtype:
                      anyOf:
                        - $ref: '#/components/schemas/IntegrationType'
                        - $ref: '#/components/schemas/SystemSubtypes'
                    isPrivate:
                      type: boolean
                resourceIds:
                  type: array
                  items:
                    $ref: '#/components/schemas/UUID'
                label:
                  type: number
                  nullable: true
                  description: Label of the resource - pass null for resources that have no label.
                shared:
                  type: array
                  items:
                    $ref: '#/components/schemas/SharingFilters'
                rootTypes:
                  type: array
                  items:
                    $ref: '#/components/schemas/RootType'
                includeRoots:
                  type: boolean
                  default: false
                skipInclusions:
                  type: boolean
                  default: false
                createdBefore:
                  type: string
                  nullable: true
                createdAfter:
                  type: string
                  nullable: true
                modifiedBefore:
                  type: string
                  nullable: true
                modifiedAfter:
                  type: string
                  nullable: true
                includeDescendants:
                  type: integer
                  maximum: 3
                  minimum: 0
                includeSubfolderCount:
                  type: boolean
                limit:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                  default: 20
                cursor:
                  type: string
                random:
                  type: boolean
                userIds:
                  type: array
                  items:
                    $ref: '#/components/schemas/UUID'
                order:
                  type: object
                  properties:
                    property:
                      type: string
                      enum:
                        - createdAt
                        - createdAt
                        - modifiedAt
                        - kind
                        - name
                    direction:
                      type: string
                      enum:
                        - ASC
                        - DESC
                      default: ASC
                  required:
                    - property
      responses:
        '200':
          description: Resource filter results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceFilterResponse'
  /v2/resources/recover:
    post:
      operationId: recoverResources
      x-method-name: recover
      tags:
        - Resources
      summary: Recover resources
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - schema:
            type: string
          required: false
          name: accessToken
          in: query
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceIds:
                  type: array
                  items:
                    $ref: '#/components/schemas/UUID'
                  minItems: 1
              required:
                - resourceIds
      responses:
        '204':
          description: Resources recovered
  /v2/resources/delete:
    post:
      operationId: removeResources
      x-method-name: remove
      tags:
        - Resources
      summary: Delete resources
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - schema:
            type: string
          required: false
          name: accessToken
          in: query
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceIds:
                  type: array
                  items:
                    $ref: '#/components/schemas/UUID'
                  minItems: 1
                archive:
                  type: boolean
                  default: false
              required:
                - resourceIds
      responses:
        '204':
          description: Resources deleted
  /v2/resource-roots/{resourceRootId}:
    get:
      tags:
        - Resource roots
      operationId: getResourceRoot
      x-method-name: get
      summary: Get resource root
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - schema:
            $ref: '#/components/schemas/UUID'
          required: true
          name: resourceRootId
          in: path
      responses:
        '200':
          description: Root detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceRootDetail'
  /v2/resource-roots:
    get:
      tags:
        - Resource roots
      operationId: listResourceRoots
      x-method-name: list
      summary: List resource roots
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - schema:
            type: integer
            minimum: 0
            exclusiveMinimum: true
          required: false
          name: limit
          in: query
        - schema:
            type: integer
            nullable: true
            minimum: 0
          required: false
          name: offset
          in: query
        - schema:
            type: object
            properties:
              property:
                type: string
                enum:
                  - name
                  - name
              direction:
                type: string
                enum:
                  - ASC
                  - DESC
                default: ASC
            required:
              - property
          required: false
          name: order
          in: query
        - schema:
            type: array
            items:
              type: object
              properties:
                type:
                  $ref: '#/components/schemas/RootType'
                subtype:
                  anyOf:
                    - $ref: '#/components/schemas/IntegrationType'
                    - $ref: '#/components/schemas/SystemSubtypes'
          required: false
          name: types
          in: query
        - schema:
            type: string
          required: false
          name: search
          in: query
        - schema:
            type: array
            items:
              $ref: '#/components/schemas/PermissionRole'
            minItems: 1
          required: false
          name: role
          in: query
        - schema:
            type: number
            nullable: true
            minimum: 0
            maximum: 10
          required: false
          name: includeMembers
          in: query
        - schema:
            type: number
            nullable: true
            minimum: 0
            maximum: 10
          required: false
          name: includeResources
          in: query
      responses:
        '200':
          description: List of roots
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: number
                    minimum: 0
                  data:
                    type: object
                    properties:
                      roots:
                        type: array
                        items:
                          $ref: '#/components/schemas/ResourceRootListItem'
                      integrations:
                        type: array
                        items:
                          allOf:
                            - $ref: '#/components/schemas/PublicIntegrationSchema'
                            - type: object
                              required:
                                - mirrorRegistries
                      sharedWith:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            members:
                              type: array
                              items:
                                allOf:
                                  - $ref: '#/components/schemas/UserProfilePublic'
                                  - type: object
                                    properties:
                                      permission:
                                        type: object
                                        properties:
                                          role:
                                            $ref: '#/components/schemas/PermissionRole'
                                        required:
                                          - role
                                    required:
                                      - permission
                            totalMembers:
                              type: number
                          required:
                            - members
                            - totalMembers
                      resources:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            $ref: '#/components/schemas/ResourceDetail'
                    required:
                      - roots
                      - integrations
                required:
                  - count
                  - data
  /v2/search:
    post:
      operationId: search
      x-method-name: search
      tags:
        - Search
      summary: Search
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - oneOf:
                    - type: object
                      properties:
                        text:
                          type: string
                          maxLength: 255
                      required:
                        - mode
                        - text
                    - type: object
                - type: object
                  properties:
                    filters:
                      type: object
                      properties:
                        kinds:
                          type: array
                          items:
                            type: string
                            enum:
                              - default
                              - image
                              - document
                              - folder
                              - bookmark
                              - highlight
                              - notepad
                              - video
                              - audio
                              - email
                              - person
                              - voicenote
                        color:
                          type: array
                          items:
                            type: number
                        parentIds:
                          type: array
                          items:
                            $ref: '#/components/schemas/UUID'
                        ancestorIds:
                          type: array
                          items:
                            $ref: '#/components/schemas/UUID'
                        rootIds:
                          type: array
                          items:
                            $ref: '#/components/schemas/UUID'
                        roots:
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                $ref: '#/components/schemas/RootType'
                              subtype:
                                anyOf:
                                  - $ref: '#/components/schemas/SystemSubtypes'
                                  - $ref: '#/components/schemas/IntegrationType'
                              isPrivate:
                                type: boolean
                            required:
                              - type
                        excludeRoots:
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                $ref: '#/components/schemas/RootType'
                              subtype:
                                anyOf:
                                  - $ref: '#/components/schemas/SystemSubtypes'
                                  - $ref: '#/components/schemas/IntegrationType'
                              isPrivate:
                                type: boolean
                            required:
                              - type
                        tagIds:
                          type: array
                          items:
                            $ref: '#/components/schemas/UUID'
                        userId:
                          allOf:
                            - $ref: '#/components/schemas/UUID'
                        userIds:
                          type: array
                          items:
                            $ref: '#/components/schemas/UUID'
                        createdAfter:
                          type: string
                          nullable: true
                        createdBefore:
                          type: string
                          nullable: true
                    precision:
                      type: number
                - type: object
                  properties:
                    queries:
                      type: array
                      items:
                        allOf:
                          - oneOf:
                              - type: object
                                properties:
                                  text:
                                    type: string
                                    maxLength: 255
                                required:
                                  - mode
                                  - text
                              - type: object
                          - type: object
                            properties:
                              filters:
                                type: object
                                properties:
                                  kinds:
                                    type: array
                                    items:
                                      type: string
                                      enum:
                                        - default
                                        - image
                                        - document
                                        - folder
                                        - bookmark
                                        - highlight
                                        - notepad
                                        - video
                                        - audio
                                        - email
                                        - person
                                        - voicenote
                                  color:
                                    type: array
                                    items:
                                      type: number
                                  parentIds:
                                    type: array
                                    items:
                                      $ref: '#/components/schemas/UUID'
                                  ancestorIds:
                                    type: array
                                    items:
                                      $ref: '#/components/schemas/UUID'
                                  rootIds:
                                    type: array
                                    items:
                                      $ref: '#/components/schemas/UUID'
                                  roots:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        type:
                                          $ref: '#/components/schemas/RootType'
                                        subtype:
                                          anyOf:
                                            - $ref: '#/components/schemas/SystemSubtypes'
                                            - $ref: '#/components/schemas/IntegrationType'
                                        isPrivate:
                                          type: boolean
                                      required:
                                        - type
                                  excludeRoots:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        type:
                                          $ref: '#/components/schemas/RootType'
                                        subtype:
                                          anyOf:
                                            - $ref: '#/components/schemas/SystemSubtypes'
                                            - $ref: '#/components/schemas/IntegrationType'
                                        isPrivate:
                                          type: boolean
                                      required:
                                        - type
                                  tagIds:
                                    type: array
                                    items:
                                      $ref: '#/components/schemas/UUID'
                                  userId:
                                    allOf:
                                      - $ref: '#/components/schemas/UUID'
                                  userIds:
                                    type: array
                                    items:
                                      $ref: '#/components/schemas/UUID'
                                  createdAfter:
                                    type: string
                                    nullable: true
                                  createdBefore:
                                    type: string
                                    nullable: true
                              precision:
                                type: number
                    incognito:
                      type: boolean
                      nullable: true
                      default: false
                      description: Does not store search query in search history, if set to true.
                    pagination:
                      type: object
                      properties:
                        page:
                          type: integer
                          minimum: 0
                          exclusiveMinimum: true
                          default: 1
                        pageSize:
                          type: integer
                          minimum: 0
                          exclusiveMinimum: true
                          default: 20
                    sort:
                      type: object
                      properties:
                        field:
                          type: string
                          enum:
                            - createdAt
                            - modifiedAt
                            - kind
                            - id
                        order:
                          type: string
                          enum:
                            - asc
                            - desc
                          default: asc
                      required:
                        - field
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: number
                  hasMore:
                    type: boolean
                  hits:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/ResourceDetail'
                        - type: object
                          properties:
                            score:
                              type: number
                            embeddings:
                              type: object
                              properties:
                                small3_512:
                                  type: array
                                  items:
                                    type: number
                                clip2:
                                  type: array
                                  items:
                                    type: number
                          required:
                            - score
                required:
                  - total
                  - hasMore
                  - hits
