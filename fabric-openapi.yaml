components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://fabric.so/oauth2/authorize
          tokenUrl: /oauth2/token
          refreshUrl: /oauth2/token
          scopes: {}
    ApiKey:
      type: apiKey
      in: header
      name: X-Api-Key
      description: 'You can generate your API key under settings inside the Fabric app. Important: do not share or publish this key in your client-side code.'
  parameters:
    WorkspaceIdHeader:
      name: X-Fabric-Workspace-Id
      in: header
      required: false
      description: Optional. When provided, the request is executed against the specified delegated workspace. If omitted, the parent workspace is used.
      schema:
        type: string
  schemas:
    UUID:
      type: string
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
    AssistantChat:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          nullable: true
        isPinned:
          type: boolean
        createdAt:
          type: string
        modifiedAt:
          type: string
      required:
        - id
        - isPinned
        - createdAt
        - modifiedAt
    ChatbotModel:
      type: string
      nullable: true
      enum:
        - dummy
        - gpt-5-1
        - gpt-5-1-instant
        - gpt-5-2
        - gpt-5-2-instant
        - claude-haiku-4-5
        - claude-sonnet-4-5
        - claude-opus-4-6
        - gemini-3-flash
        - gemini-3-pro
        - grok-4
        - claude-opus-4-5
        - gpt-4o
        - gpt-4-1
        - gemini-2-5-flash
    ToolStatus:
      type: string
      enum:
        - pending
        - success
        - failure
        - needs_confirmation
    AssistantMessagePart:
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum:
                - text
            text:
              type: string
          required:
            - type
            - text
        - type: object
          properties:
            type:
              type: string
              enum:
                - tool
            name:
              type: string
            callId:
              type: string
            status:
              $ref: '#/components/schemas/ToolStatus'
            args:
              type: object
              additionalProperties:
                nullable: true
            result:
              nullable: true
            error:
              type: string
          required:
            - type
            - name
            - callId
            - status
            - args
    AssistantMessageBase:
      type: object
      properties:
        role:
          type: string
          enum:
            - user
            - assistant
        parts:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AssistantMessagePart'
          minItems: 1
        content:
          type: string
          nullable: true
          maxLength: 100000
      required:
        - role
    AssistantMessage:
      allOf:
        - $ref: '#/components/schemas/AssistantMessageBase'
        - type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            assistantChatId:
              $ref: '#/components/schemas/UUID'
            model:
              $ref: '#/components/schemas/ChatbotModel'
            context:
              type: object
              nullable: true
              properties:
                resourceIds:
                  type: array
                  items:
                    $ref: '#/components/schemas/UUID'
                snippets:
                  type: array
                  items:
                    type: string
            createdAt:
              type: string
            modifiedAt:
              type: string
          required:
            - id
            - assistantChatId
            - model
            - context
            - createdAt
            - modifiedAt
    UserGroup:
      type: string
      enum:
        - admin
        - fabric-internal
        - fabric-email
        - investor
        - dogfooding
        - google-drive-beta
        - beta-user-recap
        - local-file-sync
        - notepad-diffs
    UserProfilePublic:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          nullable: true
          maxLength: 255
          pattern: ^[\p{Letter}\p{Emoji_Presentation}\p{Emoji_Modifier}0-9\s\-.']{1,255}$
        pictureUrlCdn:
          type: string
          nullable: true
          maxLength: 4096
      required:
        - id
    MineProfile:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        pictureUrlCdn:
          type: string
          nullable: true
          maxLength: 4096
        name:
          type: string
          nullable: true
          maxLength: 255
          pattern: ^[\p{Letter}\p{Emoji_Presentation}\p{Emoji_Modifier}0-9\s\-.']{1,255}$
        email:
          type: string
          maxLength: 255
          format: email
        authMethod:
          type: string
          nullable: true
          maxLength: 256
        groups:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/UserGroup'
        createdAt:
          type: string
        modifiedAt:
          type: string
        emailIngestionAddress:
          type: string
          nullable: true
          format: email
      required:
        - id
        - email
        - createdAt
        - modifiedAt
        - emailIngestionAddress
        - onboarding
    CommentCreate:
      type: object
      properties:
        content:
          type: string
          maxLength: 25000
    CommentWithAuthor:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        content:
          type: string
          maxLength: 25000
        createdAt:
          type: string
        modifiedAt:
          type: string
        resourceId:
          $ref: '#/components/schemas/UUID'
        user:
          allOf:
            - $ref: '#/components/schemas/UserProfilePublic'
            - nullable: true
        mentionedUsers:
          type: array
          items:
            $ref: '#/components/schemas/UserProfilePublic'
      required:
        - id
        - content
        - annotation
        - createdAt
        - modifiedAt
        - resourceId
        - user
        - mentionedUsers
    IntegrationType:
      type: string
      enum:
        - GOOGLE_DRIVE
        - GMAIL
        - GITHUB
        - IOS_DEVICE
        - ANDROID_DEVICE
        - RSS
        - NOTION
        - LOCAL_FS
        - DROPBOX
        - ONEDRIVE
        - MIXPANEL
        - STRIPE
    IntegrationStatus:
      type: string
      enum:
        - ACTIVE
        - HIDDEN
        - INACTIVE
    PresignedImage:
      type: object
      properties:
        url:
          type: string
        width:
          type: number
          nullable: true
        height:
          type: number
          nullable: true
        mime:
          type: string
          nullable: true
      required:
        - url
    ProcessingState:
      type: string
      nullable: true
      enum:
        - pending
        - processing
        - completed
        - failed
      description: Status of the link preview
    EmailMessageMetadataBlock:
      type: object
      properties:
        emailMessage:
          type: object
          properties:
            snippet:
              type: string
              nullable: true
            subject:
              type: string
              nullable: true
            from:
              type: string
              nullable: true
            to:
              type: string
              nullable: true
            body:
              type: string
              nullable: true
            cc:
              type: string
              nullable: true
            bcc:
              type: string
              nullable: true
          required:
            - snippet
            - subject
            - from
            - to
            - body
            - cc
            - bcc
        emailPreview:
          type: object
          properties:
            html:
              type: string
              nullable: true
              description: HTML content of the email
          required:
            - html
        caption:
          type: string
          nullable: true
          description: Summary text
        keywords:
          type: array
          nullable: true
          items:
            type: string
          description: Keywords
      required:
        - emailMessage
        - caption
    PermissionRole:
      type: string
      enum:
        - owner
        - viewer
        - editor
        - commenter
    Permission:
      type: object
      properties:
        resourceId:
          $ref: '#/components/schemas/UUID'
        userId:
          $ref: '#/components/schemas/UUID'
        role:
          $ref: '#/components/schemas/PermissionRole'
        createdAt:
          type: string
        modifiedAt:
          type: string
      required:
        - resourceId
        - userId
        - role
        - createdAt
        - modifiedAt
    PermissionWithUser:
      allOf:
        - $ref: '#/components/schemas/Permission'
        - type: object
          properties:
            user:
              $ref: '#/components/schemas/UserProfilePublic'
          required:
            - user
    Kind:
      type: string
      enum:
        - default
        - image
        - document
        - folder
        - bookmark
        - highlight
        - notepad
        - video
        - audio
        - email
        - person
        - voicenote
    Tag:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        userId:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          nullable: true
        modifiedAt:
          type: string
          nullable: true
      required:
        - id
        - userId
        - name
        - description
    RootAlias:
      type: string
      enum:
        - '@alias::inbox'
        - '@alias::bin'
    FileCreation:
      type: object
      properties:
        name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 255
        attachment:
          type: object
          properties:
            path:
              type: string
            filename:
              type: string
          required:
            - path
            - filename
        parentId:
          anyOf:
            - $ref: '#/components/schemas/UUID'
            - $ref: '#/components/schemas/RootAlias'
          description: Parent resource ID or an alias (the alias is resolved to the actual ID during the request handling).
        tags:
          type: array
          items:
            anyOf:
              - type: object
                properties:
                  id:
                    $ref: '#/components/schemas/UUID'
                required:
                  - id
              - type: object
                properties:
                  name:
                    type: string
                    maxLength: 255
                required:
                  - name
        comment:
          allOf:
            - $ref: '#/components/schemas/CommentCreate'
            - nullable: true
        url:
          type: string
          format: uri
        mimeType:
          type: string
        metadata:
          type: object
          properties:
            voiceNote:
              type: boolean
              nullable: true
              description: Whether this item is the audio part of a voice note
            transcript:
              type: object
              nullable: true
              properties:
                key:
                  type: string
              required:
                - key
      required:
        - attachment
        - parentId
        - mimeType
    RootType:
      type: string
      enum:
        - SYSTEM
        - SPACE
        - INTEGRATION
    SystemSubtypes:
      type: string
      enum:
        - inbox
        - bin
    ResourceIcon:
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum:
                - emoji
            emoji:
              type: string
          required:
            - type
            - emoji
        - type: object
          properties:
            type:
              type: string
              enum:
                - predefined
            predefined:
              type: string
          required:
            - type
            - predefined
        - type: object
          properties:
            type:
              type: string
              enum:
                - customImage
            customImage:
              $ref: '#/components/schemas/PresignedImage'
          required:
            - type
            - customImage
    FolderBase:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          nullable: true
      required:
        - id
        - name
    Folder:
      allOf:
        - $ref: '#/components/schemas/FolderBase'
        - type: object
          properties:
            userId:
              $ref: '#/components/schemas/UUID'
            parentId:
              $ref: '#/components/schemas/UUID'
            isReadonly:
              type: boolean
            icon:
              allOf:
                - $ref: '#/components/schemas/ResourceIcon'
                - oneOf:
                    - type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - emoji
                        emoji:
                          type: string
                      required:
                        - type
                        - emoji
                    - type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - predefined
                        predefined:
                          type: string
                      required:
                        - type
                        - predefined
                    - type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - customImage
                        customImage:
                          $ref: '#/components/schemas/PresignedImage'
                      required:
                        - type
                        - customImage
                    - nullable: true
          required:
            - userId
